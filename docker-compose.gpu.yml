# GPU override for the repository root compose example.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  shmtu-ocr-server:
    environment:
      - OcrServer__ExecutionProvider=CUDA
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
