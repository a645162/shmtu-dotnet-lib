# Repository root example.
# Copy .env.example to .env, then run:
#   docker compose up -d
#
# GPU:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  shmtu-ocr-server:
    image: ${IMAGE_REPOSITORY:-registry.cn-shanghai.aliyuncs.com/a645162/shmtu-ocr-server}:${OCR_VARIANT:-latest}
    build:
      context: ./ocr
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-runtime-cpu}
      args:
        USE_GPU: ${USE_GPU:-false}
    container_name: shmtu-ocr-server
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-21600}:21600"
      - "${TCP_PORT:-21601}:21601"
    volumes:
      - ./models:/app/models:ro
    environment:
      - ASPNETCORE_URLS=http://+:21600
      - OcrServer__ModelDirectory=/app/models
      - OcrServer__TcpPort=21601
      - OcrServer__TcpListenAddress=0.0.0.0
      - OcrServer__PoolSize=0
      - OcrServer__ExecutionProvider=${EXECUTION_PROVIDER:-CPU}
      - OcrServer__GpuDeviceId=${GPU_DEVICE_ID:-0}
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:21600/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
