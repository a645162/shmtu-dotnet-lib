name: Build and publish to NuGet

on:
  push:
    branches: [ "main" ]
    tags: [ "v*", "*" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [ published ]

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # 1. Build & Pack
  # ============================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: (.Net)Restore dependencies
        run: dotnet restore

      - name: (.Net)Build
        run: dotnet build --no-restore --configuration Release

      - name: (.Net)Test
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Ocr"

      - name: (.Net)Pack
        run: |
          dotnet pack \
            --configuration Release \
            --output ./Output \
            ./Core/shmtu-dotnet-lib/shmtu-dotnet-lib.csproj

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: shmtu-dotnet-lib-nupkg
          path: Output/*.nupkg

  # ============================================================
  # 2. Push to NuGet.org (并行)
  # ============================================================
  push-nuget-org:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: shmtu-dotnet-lib-nupkg
          path: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is not configured."
            exit 1
          fi

          for f in *.nupkg; do
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

  # ============================================================
  # 3. Push to GitHub Packages (并行)
  # ============================================================
  push-github-packages:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'release' && github.event.action == 'published')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: shmtu-dotnet-lib-nupkg
          path: .

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in *.nupkg; do
            dotnet nuget push "$f" --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
          done
