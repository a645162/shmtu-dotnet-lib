# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build and publish to NuGet

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Test NuGet Client
        run: dotnet nuget --help

      - name: (.Net)Restore dependencies
        run: dotnet restore
      - name: (.Net)Build
        run: dotnet build --no-restore --configuration Release
      - name: (.Net)Test
        # CI 跳过 OCR 类目测试：ONNX 推理在 GitHub runner 上耗算力 + 远端 OCR 服务不稳定。
        # 本地手动跑用：dotnet test （无 --filter）
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=Ocr"

      - name: (.Net)Pack
        run: |
          dotnet pack \
            --configuration Release \
            --output ./Output \
            ./Core/shmtu-dotnet-lib/shmtu-dotnet-lib.csproj

      - name: (.Net)Publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          python ./Scripts/push_nuget.py
