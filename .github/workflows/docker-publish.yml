name: Build OCR Server Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "ocr/**"
  workflow_dispatch:

env:
  DOCKER_HUB_REPO: a645162/shmtu-ocr-server
  ALIYUN_ACR_REGION: cn-shanghai

jobs:
  # ============================================================
  # 1. 准备环境 & 读取版本号
  # ============================================================
  prepare-environment:
    runs-on: ubuntu-latest
    outputs:
      program-version: ${{ steps.set-version.outputs.program-version }}
      acr-registry: ${{ steps.set-acr.outputs.acr-registry }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve program version
        id: set-version
        run: |
          PROGRAM_VERSION=$(python Scripts/get_ocr_version.py)
          echo "program-version=${PROGRAM_VERSION}" >> $GITHUB_OUTPUT
          echo "PROGRAM_VERSION=${PROGRAM_VERSION}" >> $GITHUB_ENV

      - name: Print program version
        run: echo "'${{ env.PROGRAM_VERSION }}' will be used as the version of the program."

      - name: Configure Aliyun ACR region
        id: set-acr
        run: |
          echo "acr-registry=registry.${ALIYUN_ACR_REGION}.aliyuncs.com" >> $GITHUB_OUTPUT
          echo "ACR_REGISTRY=registry.${ALIYUN_ACR_REGION}.aliyuncs.com" >> $GITHUB_ENV

      - name: Verify Aliyun ACR settings
        run: |
          echo "Aliyun ACR REGION=${{ env.ALIYUN_ACR_REGION }}"
          echo "Aliyun ACR REGISTRY=${{ env.ACR_REGISTRY }}"

  # ============================================================
  # 2. 只构建一次并推送到 GHCR (多架构 + CPU/GPU 并行)
  # ============================================================
  build-and-push-ghcr:
    runs-on: ubuntu-latest
    needs: prepare-environment
    strategy:
      matrix:
        include:
          - variant: cpu
            target: runtime-cpu
            use_gpu: "false"
            tag_suffix: ""
          - variant: gpu
            target: runtime-gpu
            use_gpu: "true"
            tag_suffix: "-gpu"
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Export program version
        run: |
          echo "PROGRAM_VERSION=${{ needs.prepare-environment.outputs.program-version }}" >> $GITHUB_ENV

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ocr
          file: ocr/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            USE_GPU=${{ matrix.use_gpu }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/shmtu-ocr-server:${{ env.PROGRAM_VERSION }}${{ matrix.tag_suffix }}
            ghcr.io/${{ github.repository }}/shmtu-ocr-server:latest${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

  push-dockerhub:
    runs-on: ubuntu-latest
    needs: [prepare-environment, build-and-push-ghcr]
    strategy:
      matrix:
        include:
          - variant: cpu
            tag_suffix: ""
          - variant: gpu
            tag_suffix: "-gpu"
    steps:
      - name: Export program version
        run: |
          echo "PROGRAM_VERSION=${{ needs.prepare-environment.outputs.program-version }}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy multi-arch image from GHCR to Docker Hub
        run: |
          docker buildx imagetools create \
            --tag ${{ env.DOCKER_HUB_REPO }}:${{ env.PROGRAM_VERSION }}${{ matrix.tag_suffix }} \
            --tag ${{ env.DOCKER_HUB_REPO }}:latest${{ matrix.tag_suffix }} \
            ghcr.io/${{ github.repository }}/shmtu-ocr-server:${{ env.PROGRAM_VERSION }}${{ matrix.tag_suffix }}

  push-aliyun:
    runs-on: ubuntu-latest
    needs: [prepare-environment, build-and-push-ghcr]
    strategy:
      matrix:
        include:
          - variant: cpu
            tag_suffix: ""
          - variant: gpu
            tag_suffix: "-gpu"
    steps:
      - name: Export program version
        run: |
          echo "PROGRAM_VERSION=${{ needs.prepare-environment.outputs.program-version }}" >> $GITHUB_ENV
          echo "ACR_REGISTRY=${{ needs.prepare-environment.outputs.acr-registry }}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy multi-arch image from GHCR to Aliyun ACR
        run: |
          docker buildx imagetools create \
            --tag ${{ env.ACR_REGISTRY }}/${{ env.DOCKER_HUB_REPO }}:${{ env.PROGRAM_VERSION }}${{ matrix.tag_suffix }} \
            --tag ${{ env.ACR_REGISTRY }}/${{ env.DOCKER_HUB_REPO }}:latest${{ matrix.tag_suffix }} \
            ghcr.io/${{ github.repository }}/shmtu-ocr-server:${{ env.PROGRAM_VERSION }}${{ matrix.tag_suffix }}
